name: 'dbt_analytics'
version: '1.0.0'

profile: 'dbt_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
docs-paths: ["docs"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


models:
  dbt_analytics:
  
    +persist_docs:
      relation: false
      columns: false

    staging:
      +schema: staging
      +materialized: view

    intermediate:
      +schema: intermediate
      +materialized: view

    marts:
      +schema: marts
      +materialized: table

seeds:
  dbt_analytics:
    +schema: seeds
    +quote_columns: false
